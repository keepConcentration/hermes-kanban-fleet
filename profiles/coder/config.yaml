model:
  provider: copilot-acp
  default: auto

agent:
  max_turns: 100
  verbose: false

# Required so kanban_* check_fn passes for this profile
toolsets:
  - hermes-cli
  - kanban

platform_toolsets:
  cli:
    - hermes-cli
    - kanban

kanban:
  # Dispatcher is owned by orchestrator
  dispatch_in_gateway: false

terminal:
  backend: local
  timeout: 1800

memory:
  memory_enabled: true
  user_profile_enabled: true
