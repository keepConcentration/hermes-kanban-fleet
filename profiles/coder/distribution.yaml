name: coder
version: 1.1.0
description: >-
  Hermes Kanban worker for hard coding tasks. Uses Claude Code ACP via
  @agentclientprotocol/claude-agent-acp. Completes assigned cards via
  kanban_* tools.
hermes_requires: ">=0.19.0"
author: keepConcentration
license: MIT
env_requires:
  - name: HERMES_COPILOT_ACP_COMMAND
    description: Path to node.exe for launching claude-agent-acp
    required: true
  - name: HERMES_COPILOT_ACP_ARGS
    description: Path to claude-agent-acp dist/index.js
    required: true
