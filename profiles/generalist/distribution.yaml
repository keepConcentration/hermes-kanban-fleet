name: generalist
version: 1.0.0
description: >-
  Hermes Kanban worker for routine / medium tasks. Uses Cursor ACP
  (copilot-acp). Completes assigned cards and one-way reports to orchestrator.
hermes_requires: ">=0.19.0"
author: keepConcentration
license: MIT
env_requires:
  - name: DISCORD_BOT_TOKEN
    description: Discord bot token for the generalist bot
    required: false
  - name: CURSOR_API_KEY
    description: Cursor API key for ACP auth (if required by your Cursor Agent setup)
    required: false
  - name: HERMES_COPILOT_ACP_COMMAND
    description: Path to node (or cursor-agent launcher) for Cursor ACP
    required: true
  - name: HERMES_COPILOT_ACP_ARGS
    description: Args for Cursor ACP (typically index.js --mode ask acp)
    required: true
